<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/login/indexLogin.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Plataforma - Siltech</title>
  </head>
<body>
    <section class="app-login">
        <div class="div-img-login">
          <img src="/img/login-img.png" alt="Imagem Login" class="img-login">
        </div>
        <form action="" class="form-login">
          <img src="img/Logo.png" alt="Logo Siltech" class="logo-login">
            <h4 class="h4-login">SILTECH</h4>
            <h5 class="h5-login">O sol brilha para todos</h5>
            <p class="p-login">Preencha os campos com os dados corretamente</p>
              <div class="campo-login-grupo">
                <label class="label-login">Login</label>
                <input type="text" class="campo-login"/>
              </div>
              <div class="campo-login-grupo">
                <label class="label-login">Senha</label>
                <input type="text" class="campo-login"/>
              </div>
              <button id="btn-acessar" class="botao-login-acessar">Acessar</button>
        </form>
    </section>
    <script src="js/index.js"></script>
</body>
</html>
